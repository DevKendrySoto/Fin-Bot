version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: finbot-postgres
    environment:
      POSTGRES_USER: finbot
      POSTGRES_PASSWORD: finbot_password
      POSTGRES_DB: finbot_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finbot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finbot_network

  redis:
    image: redis:7-alpine
    container_name: finbot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finbot_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: finbot-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@finbot.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - finbot_network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: finbot-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - finbot_network

volumes:
  postgres_data:
  redis_data:

networks:
  finbot_network:
    driver: bridge
